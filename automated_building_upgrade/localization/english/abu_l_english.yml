 abu_upgrade_none_title:0 "No Upgrades Performed"
 abu_upgrade_none_desc:0 "Nothing could be upgraded. Check gold, reserve, innovations, terrain, or ongoing construction."

 abu_upgrade_capital_county:0 "Upgrade Capital County Only"
 abu_upgrade_capital_county_desc:0 "Max every main holding and slot in your **capital county** only.\n\n#weak Fast early-game option. Same building rules as Upgrade All Domain Buildings, but limited to your capital county.#!"

 abu_upgrade_current_duchy:0 "Upgrade Current Duchy"
 abu_upgrade_current_duchy_desc:0 "Max buildings in your direct holdings located in your **current duchy** (where your character is standing).\n\n#weak If your character has no map location, falls back to your capital duchy. Mid-game local investment without empire-wide spending.#!"

 abu_fill_empty_slots:0 "Fill Empty Slots Only"
 abu_fill_empty_slots_desc:0 "Construct tier-01 slot buildings in empty slots across your domain. Does **not** upgrade existing buildings.\n\n#weak Fills economic and military slots when terrain and innovations allow.#!"

 abu_upgrade_one_tier:0 "Upgrade One Tier"
 abu_upgrade_one_tier_desc:0 "Raise each eligible building by **one tier** across your domain, then stop.\n\n#weak Spread gold over time instead of maxing everything at once. Main holdings, slots, and new constructions each advance by at most one step.#!"

 abu_set_tier_cap:0 "Set Tier Cap"
 abu_set_tier_cap_desc:0 "Set the maximum building tier for tier-cap upgrades.\n\n#weak Current cap: [ROOT.Var('abu_tier_cap').GetValue|0] (defaults to 4 if unset). Use Upgrade to Tier Cap to apply.#!"
 abu_set_tier_cap_tooltip:0 "Choose maximum building tier for budget control"
 abu_set_tier_cap_confirm:0 "Choose cap"

 abu_upgrade_to_tier_cap:0 "Upgrade to Tier Cap"
 abu_upgrade_to_tier_cap_desc:0 "Raise buildings across your domain up to your **tier cap**, but no higher.\n\n#weak Current cap: [ROOT.Var('abu_tier_cap').GetValue|0] (defaults to 4). Use Set Tier Cap to change it. Budget control without maxing everything.#!"

 abu_upgrade_capital_county_effect_tt:0 "Max eligible buildings in your capital county. Stops at gold reserve."
 abu_upgrade_current_duchy_effect_tt:0 "Max eligible buildings in your current duchy. Stops at gold reserve."
 abu_fill_empty_slots_effect_tt:0 "Construct tier-01 buildings in empty slots only."
 abu_upgrade_one_tier_effect_tt:0 "Raise each eligible building by one tier."
 abu_upgrade_to_tier_cap_effect_tt:0 "Raise buildings up to your tier cap. Stops at gold reserve."

 abu_no_upgradable_capital_county_tt:0 "No upgradable buildings in your capital county."
 abu_no_upgradable_current_duchy_tt:0 "No upgradable buildings in your current duchy."
 abu_no_empty_slots_tt:0 "No empty slots that can be filled."

 abu_tier_cap_event_title:0 "Building Tier Cap"
 abu_tier_cap_event_desc:0 "What is the highest tier automated upgrades should reach?\n\n#weak Current cap: [ROOT.Var('abu_tier_cap').GetValue|0] (4 if unset). Main holdings max at tier 4 regardless.#!"
 abu_tier_cap_2:0 "Cap at tier 2"
 abu_tier_cap_3:0 "Cap at tier 3"
 abu_tier_cap_4:0 "Cap at tier 4"
 abu_tier_cap_5:0 "Cap at tier 5"
 abu_tier_cap_6:0 "Cap at tier 6"
 abu_tier_cap_8:0 "Cap at tier 8 (slot max)"
 abu_tier_cap_set_tt:0 "Tier-cap upgrades will stop at this level."
