l_english:
 decision_group_type_abu_decisions:0 "Automated Building Upgrade"

 abu_upgrade_domain_all:0 "Upgrade All Domain Buildings"
 abu_upgrade_domain_all_desc:0 "Max every main holding and slot in your direct domain. Main holdings first, then slots; capital county first when gold is tight.\n\n#weak Direct holdings only. Skips vassals, special buildings, yurts, and ongoing construction. Duchy capital buildings are opt-in via Include Duchy Capital Buildings. Use Set Gold Reserve to cap spending.#!"

 abu_upgrade_domain_holdings:0 "Upgrade Main Holdings"
 abu_upgrade_domain_holdings_desc:0 "Max castles, cities, temples, and tribal holdings in your direct domain.\n\n#weak Slot buildings are not changed.#!"

 abu_upgrade_domain_economic:0 "Upgrade Economic Buildings"
 abu_upgrade_domain_economic_desc:0 "Max economic slot buildings in your direct domain. Fills empty slots when affordable.\n\n#weak Main holdings and military buildings are not changed.#!"

 abu_upgrade_domain_military:0 "Upgrade Military Buildings"
 abu_upgrade_domain_military_desc:0 "Max fortification and recruitment buildings in your direct domain. Fills empty slots when affordable.\n\n#weak Main holdings and economic buildings are not changed.#!"

 abu_upgrade_domain_all_tooltip:0 "Max all main holdings and slot buildings in your domain"
 abu_upgrade_domain_holdings_tooltip:0 "Max main holdings in your domain"
 abu_upgrade_domain_economic_tooltip:0 "Max economic slot buildings in your domain"
 abu_upgrade_domain_military_tooltip:0 "Max military slot buildings in your domain"

 abu_upgrade_domain_all_confirm:0 "Upgrade everything"
 abu_upgrade_domain_holdings_confirm:0 "Upgrade main holdings"
 abu_upgrade_domain_economic_confirm:0 "Upgrade economic buildings"
 abu_upgrade_domain_military_confirm:0 "Upgrade military buildings"

 abu_set_gold_reserve:0 "Set Gold Reserve"
 abu_set_gold_reserve_desc:0 "Set a gold floor for automated upgrades.\n\n#weak Current reserve: [ROOT.Var('abu_gold_reserve').GetValue|0] @gold_icon! (0 = spend until broke).#!"
 abu_set_gold_reserve_tooltip:0 "Set minimum gold to keep when upgrading"
 abu_set_gold_reserve_confirm:0 "Choose reserve"

 abu_toggle_passive_auto_upgrade:0 "Toggle Passive Auto-Upgrade"
 abu_toggle_passive_auto_upgrade_desc:0 "When enabled, automatically upgrades your domain when your culture unlocks a new building innovation — no decision click required.\n\n#weak Runs on quarterly and yearly pulses when gold is above your reserve. Also triggers when your culture advances to a new era. Uses Upgrade All Domain Buildings rules, including duchy capital buildings if you have opted in.#!"
 abu_toggle_passive_auto_upgrade_tooltip:0 "Automatically upgrade on new building innovations"
 abu_toggle_passive_auto_upgrade_confirm:0 "Toggle passive mode"
 abu_passive_auto_upgrade_enabled_tt:0 "Passive auto-upgrade is now enabled. Your domain will upgrade when new building innovations unlock and you have gold above your reserve."
 abu_passive_auto_upgrade_disabled_tt:0 "Passive auto-upgrade is now disabled."

 abu_toggle_detailed_reports:0 "Toggle Detailed Upgrade Reports"
 abu_toggle_detailed_reports_desc:0 "When enabled, completion reports list each building type raised per province.\n\n#weak Toggle this decision to switch between summary and detailed completion reports.#!"
 abu_toggle_detailed_reports_tooltip:0 "Show per-building-type detail in upgrade completion reports"
 abu_toggle_detailed_reports_confirm:0 "Toggle detail"
 abu_detailed_reports_enabled_tt:0 "Completion reports will list building types raised in each province."
 abu_detailed_reports_disabled_tt:0 "Completion reports will list province names only."

 abu_toggle_include_duchy_capital:0 "Include Duchy Capital Buildings"
 abu_toggle_include_duchy_capital_desc:0 "When enabled, upgrade decisions also raise **existing** duchy capital buildings in your direct holdings where you hold the duchy title.\n\n#weak Off by default. Does not construct new duchy buildings or choose a building type — only upgrades buildings already present. Respects upgrade mode (economic/military/all), depth, tier cap, and gold reserve.#!"
 abu_toggle_include_duchy_capital_tooltip:0 "Also upgrade existing duchy capital buildings"
 abu_toggle_include_duchy_capital_confirm:0 "Toggle duchy buildings"
 abu_include_duchy_capital_enabled_tt:0 "Duchy capital building upgrades are now included in automated upgrade decisions."
 abu_include_duchy_capital_disabled_tt:0 "Duchy capital buildings are excluded again (default)."

 abu_gold_reserve_event_title:0 "Gold Reserve for Building Upgrades"
 abu_gold_reserve_event_desc:0 "How much gold should stay untouched?\n\n#weak Current reserve: [ROOT.Var('abu_gold_reserve').GetValue|0] @gold_icon!#!"
 abu_gold_reserve_none:0 "No reserve — spend until broke"
 abu_gold_reserve_100:0 "Keep 100 @gold_icon! in reserve"
 abu_gold_reserve_250:0 "Keep 250 @gold_icon! in reserve"
 abu_gold_reserve_500:0 "Keep 500 @gold_icon! in reserve"
 abu_gold_reserve_1000:0 "Keep 1,000 @gold_icon! in reserve"
 abu_gold_reserve_2000:0 "Keep 2,000 @gold_icon! in reserve"
 abu_gold_reserve_none_tt:0 "Spend all available gold."
 abu_gold_reserve_set_tt:0 "Stop before gold drops below this reserve."

 abu_upgrade_confirm_title:0 "Confirm Building Upgrades"
 abu_upgrade_confirm_desc:0 "#bold Cost:#! ~[ROOT.Var('abu_estimate_cost').GetValue|0] @gold_icon!\n#bold Tiers:#! [ROOT.Var('abu_estimate_upgrades').GetValue|0]\n#bold Holdings:#! [ROOT.Var('abu_estimate_provinces').GetValue|0]"
 abu_upgrade_confirm_proceed:0 "Proceed"
 abu_upgrade_confirm_cancel:0 "Cancel"
 abu_upgrade_confirm_proceed_tt:0 "Apply upgrades and spend gold."
 abu_upgrade_confirm_cancel_tt:0 "No changes."

 abu_upgrade_domain_all_effect_tt:0 "Max eligible buildings to current tier. Stops at gold reserve."
 abu_upgrade_domain_holdings_effect_tt:0 "Max main holdings to current tier. Stops at gold reserve."
 abu_upgrade_domain_economic_effect_tt:0 "Max economic slots to current tier. Stops at gold reserve."
 abu_upgrade_domain_military_effect_tt:0 "Max military slots to current tier. Stops at gold reserve."

